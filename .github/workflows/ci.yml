name: CI - Build and Push to GHCR

on:
  push:
    branches: ["main"]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cincotech/devops-platform

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}


      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
            type=sha,prefix=,format=long


      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}


      # --- TRIVY SECURITY SCAN ---

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true


      # --- DEPLOY ---

      - name: Deploy application
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |

            cd /opt/devops-platform
           # 1. Télécharger la dernière image
            docker pull ghcr.io/cincotech/devops-platform:latest

           # 2. Exporter explicitement les variables requises pour Docker Compose
           # Remplissez ici avec les valeurs réelles de votre infrastructure cible
            export IMAGE_NAME="ghcr.io/cincotech/devops-platform"
            export IMAGE_VERSION="latest"
            export HOST_PORT="80"
            export CONTAINER_PORT="80"
           # 3. Relancer l'application avec les variables chargées
            docker compose up -d
