name: Continuous Integration

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/devops-platform:latest \
            -t ghcr.io/${{ github.repository_owner }}/devops-platform:${{ github.sha }} \
            -f docker/Dockerfile .

      - name: Install Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/devops-platform:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/devops-platform:latest
          docker push ghcr.io/${{ github.repository_owner }}/devops-platform:${{ github.sha }}

